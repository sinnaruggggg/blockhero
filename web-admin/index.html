<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubricks Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f0a2e; }
        .glass { background: rgba(30, 27, 75, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(99, 102, 241, 0.2); }
        .stat-card { transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .tab-active { background: #6366f1; color: white; }
        .tab-inactive { background: rgba(30, 27, 75, 0.6); color: #a5b4fc; }
        .tab-inactive:hover { background: rgba(99, 102, 241, 0.3); }
        .modal-overlay { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        input, textarea, select { background: #1e1b4b !important; color: #e2e8f0 !important; border-color: #4338ca !important; }
        input:focus, textarea:focus, select:focus { border-color: #6366f1 !important; outline: none; box-shadow: 0 0 0 2px rgba(99,102,241,0.3); }
        table th { position: sticky; top: 0; background: #1e1b4b; z-index: 1; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f0a2e; }
        ::-webkit-scrollbar-thumb { background: #4338ca; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen text-gray-200">
    <!-- Login Screen -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass rounded-2xl p-8 w-full max-w-sm">
            <h1 class="text-2xl font-bold text-center mb-2">Cubricks Admin</h1>
            <p class="text-indigo-300 text-center text-sm mb-6">관리자 계정으로 로그인</p>
            <div class="space-y-4">
                <input id="loginEmail" type="email" placeholder="이메일" class="w-full px-4 py-3 rounded-lg border">
                <input id="loginPassword" type="password" placeholder="비밀번호" class="w-full px-4 py-3 rounded-lg border">
                <button onclick="handleLogin()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 rounded-lg font-bold transition">로그인</button>
                <p id="loginError" class="text-red-400 text-sm text-center hidden"></p>
            </div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="hidden">
        <!-- Top Bar -->
        <div class="glass border-b border-indigo-800/30 px-6 py-3 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <h1 class="text-lg font-bold">Cubricks Admin</h1>
                <span id="adminEmail" class="text-xs text-indigo-300"></span>
            </div>
            <button onclick="handleLogout()" class="text-red-400 hover:text-red-300 text-sm font-medium">로그아웃</button>
        </div>

        <!-- Tabs -->
        <div class="flex gap-1 px-6 pt-4 pb-2 overflow-x-auto">
            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="tab-active px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition">대시보드</button>
            <button onclick="switchTab('users')" id="tab-users" class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition">유저 목록</button>
            <button onclick="switchTab('grants')" id="tab-grants" class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition">재화 지급</button>
            <button onclick="switchTab('announcements')" id="tab-announcements" class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition">공지사항</button>
            <button onclick="switchTab('battles')" id="tab-battles" class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition">대전 현황</button>
        </div>

        <!-- Content -->
        <div class="px-6 py-4">
            <!-- Dashboard -->
            <div id="content-dashboard">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="glass stat-card rounded-xl p-5 text-center">
                        <div class="text-3xl mb-1">👥</div>
                        <div id="stat-totalUsers" class="text-2xl font-bold text-white">-</div>
                        <div class="text-xs text-indigo-300">총 유저</div>
                    </div>
                    <div class="glass stat-card rounded-xl p-5 text-center">
                        <div class="text-3xl mb-1">📈</div>
                        <div id="stat-todaySignups" class="text-2xl font-bold text-green-400">-</div>
                        <div class="text-xs text-indigo-300">오늘 가입</div>
                    </div>
                    <div class="glass stat-card rounded-xl p-5 text-center">
                        <div class="text-3xl mb-1">⚔️</div>
                        <div id="stat-activeRooms" class="text-2xl font-bold text-yellow-400">-</div>
                        <div class="text-xs text-indigo-300">활성 방</div>
                    </div>
                    <div class="glass stat-card rounded-xl p-5 text-center">
                        <div class="text-3xl mb-1">🔍</div>
                        <div id="stat-queueSize" class="text-2xl font-bold text-purple-400">-</div>
                        <div class="text-xs text-indigo-300">매칭 대기</div>
                    </div>
                </div>
                <div class="glass rounded-xl p-5">
                    <h3 class="font-bold mb-3">최근 지급 내역</h3>
                    <div id="recentGrants" class="text-sm text-indigo-300">로딩 중...</div>
                </div>
            </div>

            <!-- Users -->
            <div id="content-users" class="hidden">
                <div class="flex items-center gap-3 mb-4">
                    <input id="userSearch" type="text" placeholder="닉네임 또는 이메일 검색..." class="flex-1 px-4 py-2 rounded-lg border text-sm" oninput="filterUsers()">
                    <button onclick="loadUsers()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-lg text-sm font-medium transition">새로고침</button>
                </div>
                <div class="glass rounded-xl overflow-hidden">
                    <div class="overflow-x-auto max-h-[60vh] overflow-y-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="text-indigo-300 text-left">
                                    <th class="px-4 py-3 font-medium">닉네임</th>
                                    <th class="px-4 py-3 font-medium">이메일</th>
                                    <th class="px-4 py-3 font-medium">가입 방식</th>
                                    <th class="px-4 py-3 font-medium">가입일</th>
                                    <th class="px-4 py-3 font-medium">관리자</th>
                                    <th class="px-4 py-3 font-medium">액션</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody" class="divide-y divide-indigo-800/30">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Grants -->
            <div id="content-grants" class="hidden">
                <div class="grid md:grid-cols-2 gap-4">
                    <!-- Grant Form -->
                    <div class="glass rounded-xl p-5">
                        <h3 class="font-bold mb-4">재화 지급</h3>
                        <div class="space-y-3">
                            <div>
                                <label class="text-xs text-indigo-300 mb-1 block">대상 유저</label>
                                <select id="grantUser" class="w-full px-3 py-2 rounded-lg border text-sm">
                                    <option value="">유저 선택...</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-xs text-indigo-300 mb-1 block">지급 유형</label>
                                <select id="grantType" class="w-full px-3 py-2 rounded-lg border text-sm">
                                    <option value="stars">⭐ 스타</option>
                                    <option value="diamonds">💎 다이아</option>
                                    <option value="hearts">❤️ 하트</option>
                                    <option value="hammer">🔨 해머</option>
                                    <option value="refresh">🔄 새로고침</option>
                                    <option value="addTurns">➕ 턴 추가</option>
                                    <option value="bomb">💣 폭탄</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-xs text-indigo-300 mb-1 block">수량</label>
                                <input id="grantAmount" type="number" min="1" value="100" class="w-full px-3 py-2 rounded-lg border text-sm">
                            </div>
                            <div>
                                <label class="text-xs text-indigo-300 mb-1 block">사유 (선택)</label>
                                <input id="grantReason" type="text" placeholder="예: 이벤트 보상" class="w-full px-3 py-2 rounded-lg border text-sm">
                            </div>
                            <button onclick="handleGrant()" class="w-full py-2 bg-green-600 hover:bg-green-700 rounded-lg font-bold text-sm transition">지급하기</button>

                            <!-- Bulk grant -->
                            <div class="border-t border-indigo-800/30 pt-3 mt-3">
                                <h4 class="text-sm font-medium mb-2 text-indigo-300">전체 유저 지급</h4>
                                <button onclick="handleBulkGrant()" class="w-full py-2 bg-yellow-600 hover:bg-yellow-700 rounded-lg font-bold text-sm transition">전체 유저에게 지급</button>
                            </div>
                        </div>
                    </div>

                    <!-- Grant History -->
                    <div class="glass rounded-xl p-5">
                        <h3 class="font-bold mb-4">지급 내역</h3>
                        <div id="grantHistory" class="space-y-2 max-h-[50vh] overflow-y-auto text-sm">
                            로딩 중...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Announcements -->
            <div id="content-announcements" class="hidden">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-bold">공지사항 관리</h3>
                    <button onclick="showAnnouncementModal()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-lg text-sm font-medium transition">+ 새 공지</button>
                </div>
                <div id="announcementsList" class="space-y-3">
                    로딩 중...
                </div>
            </div>

            <!-- Battles -->
            <div id="content-battles" class="hidden">
                <div class="grid md:grid-cols-2 gap-4">
                    <div class="glass rounded-xl p-5">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-bold">활성 방 목록</h3>
                            <button onclick="cleanupRooms()" class="px-3 py-1 bg-red-600/30 hover:bg-red-600/50 text-red-300 rounded-lg text-xs font-medium transition">오래된 방 정리</button>
                        </div>
                        <div id="roomsList" class="space-y-2 max-h-[50vh] overflow-y-auto text-sm">
                            로딩 중...
                        </div>
                    </div>
                    <div class="glass rounded-xl p-5">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-bold">매칭 큐</h3>
                            <button onclick="cleanupQueue()" class="px-3 py-1 bg-red-600/30 hover:bg-red-600/50 text-red-300 rounded-lg text-xs font-medium transition">대기열 정리</button>
                        </div>
                        <div id="queueList" class="space-y-2 max-h-[50vh] overflow-y-auto text-sm">
                            로딩 중...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Announcement Modal -->
    <div id="announcementModal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
        <div class="glass rounded-2xl p-6 w-full max-w-lg">
            <h3 id="modalTitle" class="font-bold text-lg mb-4">새 공지사항</h3>
            <input type="hidden" id="editAnnouncementId">
            <div class="space-y-3">
                <div>
                    <label class="text-xs text-indigo-300 mb-1 block">제목</label>
                    <input id="annTitle" type="text" placeholder="공지 제목" class="w-full px-3 py-2 rounded-lg border text-sm">
                </div>
                <div>
                    <label class="text-xs text-indigo-300 mb-1 block">내용</label>
                    <textarea id="annContent" rows="4" placeholder="공지 내용" class="w-full px-3 py-2 rounded-lg border text-sm resize-none"></textarea>
                </div>
                <div class="flex items-center gap-2">
                    <input id="annActive" type="checkbox" checked class="accent-indigo-600">
                    <label class="text-sm text-indigo-300">활성화</label>
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="saveAnnouncement()" class="flex-1 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-lg font-bold text-sm transition">저장</button>
                    <button onclick="closeAnnouncementModal()" class="flex-1 py-2 bg-gray-600 hover:bg-gray-700 rounded-lg font-bold text-sm transition">취소</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 z-50 hidden">
        <div class="glass rounded-lg px-4 py-3 text-sm font-medium shadow-lg"></div>
    </div>

    <script>
        // ============================================
        // Supabase 설정
        // ============================================
        const SUPABASE_URL = 'https://alhlmdhixmlmsdvgzhdu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFsaGxtZGhpeG1sbXNkdmd6aGR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNTY4NTQsImV4cCI6MjA4ODYzMjg1NH0.lkTNn1jeXzkQdCRnmtNAjejezJN_RfC1n5HEhCbV_n8';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUsers = [];
        let currentTab = 'dashboard';

        // ============================================
        // Auth
        // ============================================
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            errorEl.classList.add('hidden');

            if (!email || !password) {
                showLoginError('이메일과 비밀번호를 입력하세요');
                return;
            }

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                showLoginError(error.message);
                return;
            }

            // Check admin
            const { data: profile } = await supabase.from('profiles').select('is_admin').eq('id', data.user.id).single();
            if (!profile?.is_admin) {
                await supabase.auth.signOut();
                showLoginError('관리자 권한이 없습니다');
                return;
            }

            showAdmin(data.user.email);
        }

        function showLoginError(msg) {
            const el = document.getElementById('loginError');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
        }

        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) return;

            const { data: profile } = await supabase.from('profiles').select('is_admin').eq('id', session.user.id).single();
            if (profile?.is_admin) {
                showAdmin(session.user.email);
            }
        }

        function showAdmin(email) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('adminEmail').textContent = email;
            loadDashboard();
        }

        // ============================================
        // Tabs
        // ============================================
        function switchTab(tab) {
            document.querySelectorAll('[id^="content-"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('[id^="tab-"]').forEach(el => {
                el.classList.remove('tab-active');
                el.classList.add('tab-inactive');
            });

            document.getElementById(`content-${tab}`).classList.remove('hidden');
            const tabBtn = document.getElementById(`tab-${tab}`);
            tabBtn.classList.remove('tab-inactive');
            tabBtn.classList.add('tab-active');
            currentTab = tab;

            switch (tab) {
                case 'dashboard': loadDashboard(); break;
                case 'users': loadUsers(); break;
                case 'grants': loadGrantsPage(); break;
                case 'announcements': loadAnnouncements(); break;
                case 'battles': loadBattles(); break;
            }
        }

        // ============================================
        // Dashboard
        // ============================================
        async function loadDashboard() {
            try {
                const { data, error } = await supabase.rpc('get_admin_stats');
                if (error) throw error;
                const stats = data[0];
                document.getElementById('stat-totalUsers').textContent = stats.total_users;
                document.getElementById('stat-todaySignups').textContent = stats.today_signups;
                document.getElementById('stat-activeRooms').textContent = stats.active_rooms;
                document.getElementById('stat-queueSize').textContent = stats.queue_size;
            } catch (e) {
                console.error('Stats error:', e);
            }

            // Recent grants
            try {
                const { data: grants } = await supabase
                    .from('resource_grants')
                    .select('*, profiles!resource_grants_user_id_fkey(nickname)')
                    .order('created_at', { ascending: false })
                    .limit(10);

                const container = document.getElementById('recentGrants');
                if (!grants || grants.length === 0) {
                    container.innerHTML = '<p class="text-indigo-400">지급 내역이 없습니다</p>';
                    return;
                }

                container.innerHTML = grants.map(g => `
                    <div class="flex items-center justify-between py-2 border-b border-indigo-800/20">
                        <div>
                            <span class="text-white font-medium">${g.profiles?.nickname || '알 수 없음'}</span>
                            <span class="text-indigo-400 ml-2">${getTypeLabel(g.grant_type)} ${g.amount}개</span>
                            ${g.reason ? `<span class="text-indigo-500 ml-2 text-xs">(${g.reason})</span>` : ''}
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="px-2 py-0.5 rounded text-xs ${g.status === 'pending' ? 'bg-yellow-600/30 text-yellow-300' : 'bg-green-600/30 text-green-300'}">${g.status === 'pending' ? '대기' : '수령'}</span>
                            <span class="text-xs text-indigo-400">${formatDate(g.created_at)}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('recentGrants').innerHTML = '<p class="text-red-400">로딩 실패</p>';
            }
        }

        // ============================================
        // Users
        // ============================================
        async function loadUsers() {
            try {
                const { data, error } = await supabase.rpc('get_admin_users');
                if (error) throw error;
                currentUsers = data || [];
                renderUsers(currentUsers);
            } catch (e) {
                console.error('Users error:', e);
                document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-red-400">로딩 실패</td></tr>';
            }
        }

        function filterUsers() {
            const q = document.getElementById('userSearch').value.toLowerCase();
            const filtered = currentUsers.filter(u =>
                (u.nickname || '').toLowerCase().includes(q) ||
                (u.email || '').toLowerCase().includes(q)
            );
            renderUsers(filtered);
        }

        function renderUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            if (!users.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-indigo-400">유저가 없습니다</td></tr>';
                return;
            }
            tbody.innerHTML = users.map(u => `
                <tr class="hover:bg-indigo-900/20">
                    <td class="px-4 py-3 font-medium text-white">${escapeHtml(u.nickname || '-')}</td>
                    <td class="px-4 py-3 text-indigo-300">${escapeHtml(u.email || '-')}</td>
                    <td class="px-4 py-3">
                        <span class="px-2 py-0.5 rounded text-xs ${u.provider === 'google' ? 'bg-blue-600/30 text-blue-300' : 'bg-gray-600/30 text-gray-300'}">${u.provider || 'email'}</span>
                    </td>
                    <td class="px-4 py-3 text-indigo-300">${formatDate(u.created_at)}</td>
                    <td class="px-4 py-3">${u.is_admin ? '<span class="text-yellow-400 font-bold">관리자</span>' : ''}</td>
                    <td class="px-4 py-3">
                        <button onclick="quickGrant('${u.id}', '${escapeHtml(u.nickname || u.email)}')" class="px-2 py-1 bg-green-600/30 hover:bg-green-600/50 text-green-300 rounded text-xs transition">지급</button>
                    </td>
                </tr>
            `).join('');
        }

        function quickGrant(userId, name) {
            switchTab('grants');
            setTimeout(() => {
                const sel = document.getElementById('grantUser');
                sel.value = userId;
                if (!sel.value) {
                    // If user not in select yet, reload
                    loadGrantUserSelect().then(() => { sel.value = userId; });
                }
            }, 100);
        }

        // ============================================
        // Grants
        // ============================================
        async function loadGrantsPage() {
            await loadGrantUserSelect();
            await loadGrantHistory();
        }

        async function loadGrantUserSelect() {
            try {
                const { data } = await supabase.rpc('get_admin_users');
                const sel = document.getElementById('grantUser');
                const current = sel.value;
                sel.innerHTML = '<option value="">유저 선택...</option>' +
                    (data || []).map(u => `<option value="${u.id}">${escapeHtml(u.nickname || 'Unknown')} (${escapeHtml(u.email || '')})</option>`).join('');
                if (current) sel.value = current;
            } catch (e) {
                console.error(e);
            }
        }

        async function handleGrant() {
            const userId = document.getElementById('grantUser').value;
            const type = document.getElementById('grantType').value;
            const amount = parseInt(document.getElementById('grantAmount').value);
            const reason = document.getElementById('grantReason').value;

            if (!userId) { showToast('유저를 선택하세요', 'red'); return; }
            if (!amount || amount <= 0) { showToast('수량을 입력하세요', 'red'); return; }

            const { data: { user } } = await supabase.auth.getUser();
            const { error } = await supabase.from('resource_grants').insert({
                user_id: userId,
                grant_type: type,
                amount,
                reason: reason || null,
                granted_by: user.id,
            });

            if (error) {
                showToast('지급 실패: ' + error.message, 'red');
                return;
            }

            showToast(`${getTypeLabel(type)} ${amount}개 지급 완료!`, 'green');
            loadGrantHistory();
        }

        async function handleBulkGrant() {
            const type = document.getElementById('grantType').value;
            const amount = parseInt(document.getElementById('grantAmount').value);
            const reason = document.getElementById('grantReason').value;

            if (!amount || amount <= 0) { showToast('수량을 입력하세요', 'red'); return; }
            if (!confirm(`전체 유저에게 ${getTypeLabel(type)} ${amount}개를 지급하시겠습니까?`)) return;

            try {
                const { data: users } = await supabase.rpc('get_admin_users');
                const { data: { user } } = await supabase.auth.getUser();

                const grants = (users || []).map(u => ({
                    user_id: u.id,
                    grant_type: type,
                    amount,
                    reason: reason || '전체 지급',
                    granted_by: user.id,
                }));

                const { error } = await supabase.from('resource_grants').insert(grants);
                if (error) throw error;

                showToast(`전체 ${grants.length}명에게 지급 완료!`, 'green');
                loadGrantHistory();
            } catch (e) {
                showToast('전체 지급 실패: ' + e.message, 'red');
            }
        }

        async function loadGrantHistory() {
            try {
                const { data: grants } = await supabase
                    .from('resource_grants')
                    .select('*, profiles!resource_grants_user_id_fkey(nickname)')
                    .order('created_at', { ascending: false })
                    .limit(50);

                const container = document.getElementById('grantHistory');
                if (!grants || grants.length === 0) {
                    container.innerHTML = '<p class="text-indigo-400">지급 내역이 없습니다</p>';
                    return;
                }

                container.innerHTML = grants.map(g => `
                    <div class="glass rounded-lg p-3">
                        <div class="flex items-center justify-between">
                            <span class="font-medium text-white">${escapeHtml(g.profiles?.nickname || '알 수 없음')}</span>
                            <span class="px-2 py-0.5 rounded text-xs ${g.status === 'pending' ? 'bg-yellow-600/30 text-yellow-300' : 'bg-green-600/30 text-green-300'}">${g.status === 'pending' ? '대기' : '수령'}</span>
                        </div>
                        <div class="text-indigo-300 mt-1">${getTypeLabel(g.grant_type)} ${g.amount}개 ${g.reason ? '- ' + escapeHtml(g.reason) : ''}</div>
                        <div class="text-xs text-indigo-500 mt-1">${formatDate(g.created_at)}</div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('grantHistory').innerHTML = '<p class="text-red-400">로딩 실패</p>';
            }
        }

        // ============================================
        // Announcements
        // ============================================
        async function loadAnnouncements() {
            try {
                const { data, error } = await supabase
                    .from('announcements')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                const container = document.getElementById('announcementsList');

                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="glass rounded-xl p-8 text-center text-indigo-400">공지사항이 없습니다</div>';
                    return;
                }

                container.innerHTML = data.map(a => `
                    <div class="glass rounded-xl p-4">
                        <div class="flex items-start justify-between">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="px-2 py-0.5 rounded text-xs ${a.is_active ? 'bg-green-600/30 text-green-300' : 'bg-gray-600/30 text-gray-400'}">${a.is_active ? '활성' : '비활성'}</span>
                                    <h4 class="font-bold text-white">${escapeHtml(a.title)}</h4>
                                </div>
                                <p class="text-sm text-indigo-300 whitespace-pre-wrap">${escapeHtml(a.content)}</p>
                                <p class="text-xs text-indigo-500 mt-2">${formatDate(a.created_at)}</p>
                            </div>
                            <div class="flex gap-1 ml-3">
                                <button onclick="editAnnouncement(${a.id})" class="px-2 py-1 bg-indigo-600/30 hover:bg-indigo-600/50 text-indigo-300 rounded text-xs transition">수정</button>
                                <button onclick="toggleAnnouncement(${a.id}, ${!a.is_active})" class="px-2 py-1 ${a.is_active ? 'bg-yellow-600/30 hover:bg-yellow-600/50 text-yellow-300' : 'bg-green-600/30 hover:bg-green-600/50 text-green-300'} rounded text-xs transition">${a.is_active ? '숨기기' : '활성화'}</button>
                                <button onclick="deleteAnnouncement(${a.id})" class="px-2 py-1 bg-red-600/30 hover:bg-red-600/50 text-red-300 rounded text-xs transition">삭제</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('announcementsList').innerHTML = '<div class="text-red-400">로딩 실패</div>';
            }
        }

        function showAnnouncementModal(id = null) {
            document.getElementById('editAnnouncementId').value = id || '';
            document.getElementById('modalTitle').textContent = id ? '공지사항 수정' : '새 공지사항';
            document.getElementById('annTitle').value = '';
            document.getElementById('annContent').value = '';
            document.getElementById('annActive').checked = true;
            document.getElementById('announcementModal').classList.remove('hidden');
        }

        function closeAnnouncementModal() {
            document.getElementById('announcementModal').classList.add('hidden');
        }

        async function editAnnouncement(id) {
            const { data } = await supabase.from('announcements').select('*').eq('id', id).single();
            if (!data) return;

            document.getElementById('editAnnouncementId').value = id;
            document.getElementById('modalTitle').textContent = '공지사항 수정';
            document.getElementById('annTitle').value = data.title;
            document.getElementById('annContent').value = data.content;
            document.getElementById('annActive').checked = data.is_active;
            document.getElementById('announcementModal').classList.remove('hidden');
        }

        async function saveAnnouncement() {
            const id = document.getElementById('editAnnouncementId').value;
            const title = document.getElementById('annTitle').value.trim();
            const content = document.getElementById('annContent').value.trim();
            const is_active = document.getElementById('annActive').checked;

            if (!title || !content) { showToast('제목과 내용을 입력하세요', 'red'); return; }

            const { data: { user } } = await supabase.auth.getUser();

            if (id) {
                const { error } = await supabase.from('announcements').update({ title, content, is_active }).eq('id', id);
                if (error) { showToast('수정 실패: ' + error.message, 'red'); return; }
                showToast('공지사항 수정 완료', 'green');
            } else {
                const { error } = await supabase.from('announcements').insert({ title, content, is_active, created_by: user.id });
                if (error) { showToast('작성 실패: ' + error.message, 'red'); return; }
                showToast('공지사항 작성 완료', 'green');
            }

            closeAnnouncementModal();
            loadAnnouncements();
        }

        async function toggleAnnouncement(id, active) {
            const { error } = await supabase.from('announcements').update({ is_active: active }).eq('id', id);
            if (error) { showToast('변경 실패', 'red'); return; }
            loadAnnouncements();
        }

        async function deleteAnnouncement(id) {
            if (!confirm('정말 삭제하시겠습니까?')) return;
            const { error } = await supabase.from('announcements').delete().eq('id', id);
            if (error) { showToast('삭제 실패', 'red'); return; }
            showToast('삭제 완료', 'green');
            loadAnnouncements();
        }

        // ============================================
        // Battles
        // ============================================
        async function loadBattles() {
            // Rooms
            try {
                const { data: rooms } = await supabase
                    .from('rooms')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(50);

                const container = document.getElementById('roomsList');
                if (!rooms || rooms.length === 0) {
                    container.innerHTML = '<p class="text-indigo-400">활성 방이 없습니다</p>';
                } else {
                    container.innerHTML = rooms.map(r => `
                        <div class="glass rounded-lg p-3 flex items-center justify-between">
                            <div>
                                <span class="font-mono font-bold text-white">${r.code}</span>
                                <span class="ml-2 px-2 py-0.5 rounded text-xs ${r.status === 'playing' ? 'bg-green-600/30 text-green-300' : r.status === 'waiting' ? 'bg-yellow-600/30 text-yellow-300' : 'bg-gray-600/30 text-gray-400'}">${r.status}</span>
                            </div>
                            <span class="text-xs text-indigo-400">${formatDate(r.created_at)}</span>
                        </div>
                    `).join('');
                }
            } catch (e) {
                document.getElementById('roomsList').innerHTML = '<p class="text-red-400">로딩 실패</p>';
            }

            // Queue
            try {
                const { data: queue } = await supabase
                    .from('matching_queue')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(50);

                const container = document.getElementById('queueList');
                if (!queue || queue.length === 0) {
                    container.innerHTML = '<p class="text-indigo-400">대기 중인 플레이어가 없습니다</p>';
                } else {
                    container.innerHTML = queue.map(q => `
                        <div class="glass rounded-lg p-3 flex items-center justify-between">
                            <div>
                                <span class="font-medium text-white">${escapeHtml(q.nickname)}</span>
                                <span class="ml-2 px-2 py-0.5 rounded text-xs ${q.status === 'waiting' ? 'bg-yellow-600/30 text-yellow-300' : 'bg-blue-600/30 text-blue-300'}">${q.status}</span>
                            </div>
                            <span class="text-xs text-indigo-400">${formatDate(q.created_at)}</span>
                        </div>
                    `).join('');
                }
            } catch (e) {
                document.getElementById('queueList').innerHTML = '<p class="text-red-400">로딩 실패</p>';
            }
        }

        async function cleanupRooms() {
            if (!confirm('1시간 이상 된 방을 모두 삭제하시겠습니까?')) return;
            const cutoff = new Date(Date.now() - 60 * 60 * 1000).toISOString();
            await supabase.from('players').delete().lt('created_at', cutoff);
            await supabase.from('rooms').delete().lt('created_at', cutoff);
            showToast('정리 완료', 'green');
            loadBattles();
        }

        async function cleanupQueue() {
            if (!confirm('매칭 대기열을 모두 비우시겠습니까?')) return;
            const cutoff = new Date(Date.now() - 5 * 60 * 1000).toISOString();
            await supabase.from('matching_queue').delete().lt('created_at', cutoff);
            showToast('정리 완료', 'green');
            loadBattles();
        }

        // ============================================
        // Helpers
        // ============================================
        function getTypeLabel(type) {
            const labels = {
                stars: '⭐ 스타',
                diamonds: '💎 다이아',
                hearts: '❤️ 하트',
                hammer: '🔨 해머',
                refresh: '🔄 새로고침',
                addTurns: '➕ 턴 추가',
                bomb: '💣 폭탄',
            };
            return labels[type] || type;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            const now = new Date();
            const diff = now - d;

            if (diff < 60000) return '방금 전';
            if (diff < 3600000) return Math.floor(diff / 60000) + '분 전';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '시간 전';
            if (diff < 604800000) return Math.floor(diff / 86400000) + '일 전';

            return d.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function showToast(msg, color = 'indigo') {
            const toast = document.getElementById('toast');
            const inner = toast.querySelector('div');
            inner.textContent = msg;
            inner.className = `glass rounded-lg px-4 py-3 text-sm font-medium shadow-lg border ${color === 'red' ? 'border-red-500/50 text-red-300' : color === 'green' ? 'border-green-500/50 text-green-300' : 'border-indigo-500/50 text-indigo-300'}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        // Enter key for login
        document.getElementById('loginPassword').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        // Init
        checkSession();
    </script>
</body>
</html>
