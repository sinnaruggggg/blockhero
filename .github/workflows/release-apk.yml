name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=8192

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm

      - name: Java 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle 실행 권한 부여
        run: chmod +x android/gradlew

      - name: 앱 버전 읽기
        id: version
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s+"\K[^"]+' android/app/build.gradle | head -n 1)
          VERSION_CODE=$(grep -oP 'versionCode\s+\K\d+' android/app/build.gradle | head -n 1)
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: 태그와 버전 일치 확인
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          EXPECTED_TAG="v${{ steps.version.outputs.version_name }}"
          if [ "${GITHUB_REF_NAME}" != "$EXPECTED_TAG" ]; then
            echo "태그(${GITHUB_REF_NAME})와 build.gradle 버전(${EXPECTED_TAG})이 다릅니다."
            exit 1
          fi

      - name: 의존성 설치
        run: npm ci

      - name: 릴리즈 APK 빌드
        working-directory: android
        run: ./gradlew assembleRelease

      - name: APK 이름 정리
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk "release/BlockHero-Codex-${{ steps.version.outputs.version_name }}.apk"

      - name: 빌드 결과 보관
        uses: actions/upload-artifact@v4
        with:
          name: blockhero-codex-apk
          path: release/*.apk

      - name: GitHub Release 업로드
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*.apk
